<svg viewBox="0 0 640 180" width="640" height="180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A cartoon frog zapping a firefly with its tongue">
  <defs>
    <radialGradient id="bgglow" cx="28%" cy="125%" r="125%">
      <stop offset="0%" stop-color="#15351c"/>
      <stop offset="60%" stop-color="#0c1410"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <rect width="640" height="180" rx="16" fill="url(#bgglow)"/>
  <rect x="1" y="1" width="638" height="178" rx="15" fill="none" stroke="#234029"/>

  <text x="34" y="44" font-family="Inter,Segoe UI,sans-serif" font-size="26" font-weight="800" fill="#89e051">license-zapper</text>
  <text x="35" y="66" font-family="Inter,Segoe UI,sans-serif" font-size="11" letter-spacing="3" fill="#6f8a74">MASS&#160;LICENSE&#160;PRODUCTION</text>

  <line x1="24" y1="150" x2="616" y2="150" stroke="#1c3322" stroke-width="2"/>

  <!-- firefly (floats + glows) -->
  <g transform="translate(556 104)">
    <animateTransform attributeName="transform" type="translate" values="556 104; 556 92; 560 112; 556 104" dur="3.2s" repeatCount="indefinite"/>
    <circle r="12" fill="#f4ff5a" opacity="0.5" filter="url(#soft)">
      <animate attributeName="opacity" values="0.25;0.85;0.25" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;14;10" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#fff7b0"/>
    <ellipse cx="-5" cy="-7" rx="4.5" ry="2" fill="#dff1ff" opacity="0.7"/>
    <ellipse cx="5" cy="-7" rx="4.5" ry="2" fill="#dff1ff" opacity="0.7"/>
  </g>

  <!-- zap tongue (flashes on the up-beat) -->
  <polyline points="206,120 300,104 360,116 470,100 545,104" fill="none" stroke="#b6ff43" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.46;0.54;0.62;1" dur="1.6s" repeatCount="indefinite"/>
  </polyline>
  <text x="392" y="56" font-family="Inter,sans-serif" font-size="20" font-weight="800" fill="#b6ff43" opacity="0">ZAP!
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.46;0.56;0.72;1" dur="1.6s" repeatCount="indefinite"/>
  </text>

  <!-- frog (bounces) -->
  <g transform="translate(150 118)">
    <animateTransform attributeName="transform" type="translate" values="150 118; 150 104; 150 118" keyTimes="0;0.5;1" dur="1.6s" calcMode="spline" keySplines="0.25 0 0.2 1;0.3 0 0.7 1" repeatCount="indefinite"/>
    <ellipse cx="0" cy="34" rx="58" ry="11" fill="#0e2615"/>
    <path d="M-42 22 q-18 6 -24 20 q12 -1 20 -9 Z" fill="#4ea636"/>
    <path d="M42 22 q18 6 24 20 q-12 -1 -20 -9 Z" fill="#4ea636"/>
    <ellipse cx="0" cy="10" rx="48" ry="32" fill="#69cf48"/>
    <ellipse cx="0" cy="22" rx="34" ry="17" fill="#8ee86a"/>
    <circle cx="-19" cy="-20" r="14" fill="#69cf48"/>
    <circle cx="19" cy="-20" r="14" fill="#69cf48"/>
    <circle cx="-19" cy="-22" r="9.5" fill="#ffffff"/>
    <circle cx="19" cy="-22" r="9.5" fill="#ffffff"/>
    <circle cx="-15" cy="-21" r="4.6" fill="#10240a"/>
    <circle cx="23" cy="-21" r="4.6" fill="#10240a"/>
    <path d="M-15 6 q15 13 30 0" stroke="#2c5a1d" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="-31" cy="4" r="4" fill="#b6ff8f" opacity="0.6"/>
    <circle cx="31" cy="4" r="4" fill="#b6ff8f" opacity="0.6"/>
  </g>
</svg>
